<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nebula Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg2:#150f3d;--ink:#2b1b52;--cream:#fff4e6;--sun:#ffd166;--bubble:#ff5ea8;--sky:#4dd0ff;--mint:#7be0b0;--grape:#b18cff}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg2);color:var(--ink);font-family:"Fredoka",system-ui,sans-serif;overflow:hidden;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  #hud{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--cream);border-bottom:4px solid var(--ink);z-index:5}
  .logo{font-weight:700;font-size:20px;color:var(--grape)}.logo b{color:var(--bubble)}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:7px;background:#fff;border:3px solid var(--ink);border-radius:22px;padding:4px 12px;font-size:14px;font-weight:600;box-shadow:0 3px 0 var(--ink)}
  .orb-ico{width:14px;height:14px;border-radius:50%;background:var(--sun);border:2px solid var(--ink)}
  #dot{width:9px;height:9px;border-radius:50%;background:var(--mint);border:2px solid var(--ink)}
  .btn{font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;border:3px solid var(--ink);border-radius:16px;padding:7px 12px;background:#fff;color:var(--ink);box-shadow:0 4px 0 var(--ink);transition:transform .05s,box-shadow .05s}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
  .btn.acc{background:var(--sun)}
  #stage{position:relative;flex:1;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  #room-name{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:var(--cream);border:3px solid var(--ink);border-radius:20px;padding:4px 16px;font-weight:600;font-size:14px;box-shadow:0 3px 0 var(--ink);pointer-events:none}
  #chatlog{position:absolute;left:12px;bottom:12px;width:min(300px,44vw);max-height:44%;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:5px;pointer-events:none;mask-image:linear-gradient(180deg,transparent,#000 20%)}
  .msg{font-size:13px;line-height:1.3;color:#fff;font-weight:500;text-shadow:-1.5px -1.5px 0 var(--ink),1.5px -1.5px 0 var(--ink),-1.5px 1.5px 0 var(--ink),1.5px 1.5px 0 var(--ink)}
  .msg b{color:var(--sun)}.msg.me b{color:var(--sky)}
  .msg.sys{color:#cbb8ff;font-style:italic;text-shadow:0 1px 3px #000}
  #emotes{display:flex;gap:6px;justify-content:center;padding:8px 12px 0;flex-wrap:wrap}
  .emo{width:44px;height:44px;font-size:22px;display:flex;align-items:center;justify-content:center;background:#fff;border:3px solid var(--ink);border-radius:14px;cursor:pointer;box-shadow:0 4px 0 var(--ink)}
  .emo:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
  #bar{display:flex;gap:8px;padding:10px 12px;background:var(--cream);border-top:4px solid var(--ink);z-index:5}
  #chatin{flex:1;min-width:0;background:#fff;border:3px solid var(--ink);color:var(--ink);border-radius:16px;padding:11px 14px;font:inherit;font-size:15px;font-weight:500;outline:none}
  #chatin::placeholder{color:#9d8bd0}
  #send{background:var(--sky)}
  .overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;overflow:auto;background:radial-gradient(1000px 560px at 50% 30%,#2a1e6b,var(--bg2) 75%)}
  .card{width:min(360px,90vw);background:var(--cream);border:4px solid var(--ink);border-radius:26px;padding:22px;text-align:center;box-shadow:0 10px 0 var(--ink);margin:16px}
  .card h1{font-size:28px;margin:0;color:var(--grape)}.card h1 b{color:var(--bubble)}
  .card p{color:#8a76c4;font-size:13px;margin:2px 0 16px;font-weight:500}
  .card label{display:block;text-align:left;font-size:13px;color:#8a76c4;margin:0 0 6px;font-weight:600}
  .inp{width:100%;background:#fff;border:3px solid var(--ink);color:var(--ink);border-radius:14px;padding:10px 14px;font:inherit;font-size:16px;font-weight:500;outline:none;margin-bottom:12px}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{flex:1;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;border:3px solid var(--ink);border-radius:12px;padding:8px;background:#fff;color:#8a76c4}
  .tab.on{background:var(--grape);color:#fff}
  .err{color:#e0396b;font-size:13px;font-weight:600;min-height:18px;margin-bottom:8px;text-align:left}
  .go{width:100%;background:var(--mint);font-size:17px;padding:12px;border-radius:16px}
  .species{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .spc{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:#8a76c4;font-weight:600;padding:4px;border-radius:12px;border:3px solid transparent}
  .spc.on{border-color:var(--sun);background:#fff}
  .spc .shape{width:34px;height:34px;border:3px solid var(--ink);box-shadow:0 3px 0 var(--ink)}
  .sh-blobbi{border-radius:50%}.sh-knuffo{width:42px;height:28px;border-radius:50%}
  .sh-slink{width:24px;height:44px;border-radius:44%}
  .sh-zacki{clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
  .sh-nebli{border-radius:50% 50% 42% 42%}
  .swatches{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
  .sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid var(--ink);box-shadow:0 3px 0 var(--ink)}
  .sw.on{outline:3px solid var(--sun);outline-offset:2px}
  .pmodal{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:transparent}
  .pcard{position:relative;width:290px;max-width:92vw;background:var(--cream);border:4px solid var(--ink);border-radius:22px;padding:16px;box-shadow:0 10px 0 var(--ink);text-align:left}
  .pclose{position:absolute;top:-12px;right:-12px;width:30px;height:30px;border-radius:50%;border:3px solid var(--ink);background:#fff;color:var(--ink);font-weight:700;cursor:pointer;box-shadow:0 3px 0 var(--ink);z-index:1}
  .phead{display:flex;gap:14px;align-items:center}
  #pcanvas{position:static;inset:auto;background:#e7dcff;border:3px solid var(--ink);border-radius:14px;flex:0 0 auto;width:96px;height:104px}
  .pmeta{display:flex;flex-direction:column;gap:7px;min-width:0;flex:1}
  .pbadge{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.5px;color:#fff;background:var(--grape);border:2px solid var(--ink);border-radius:9px;padding:2px 9px}
  .pname{font-weight:700;font-size:18px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcoins{align-self:flex-start;display:flex;align-items:center;gap:7px;font-weight:600;font-size:15px;color:var(--ink);background:#fff;border:3px solid var(--ink);border-radius:14px;padding:3px 11px;box-shadow:0 3px 0 var(--ink)}
  .coinico{display:inline-block;width:15px;height:15px;border-radius:50%;background:var(--sun);border:2px solid var(--ink)}
  .invtoggle{width:100%;margin-top:14px;display:flex;align-items:center;justify-content:space-between;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);background:#fff;border:3px solid var(--ink);border-radius:14px;padding:9px 13px;cursor:pointer;box-shadow:0 4px 0 var(--ink)}
  .invtoggle:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
  .invarrow{transition:transform .15s}
  .invarrow.open{transform:rotate(90deg)}
  .pinv{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .invcell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:22px;background:#fff;border:3px solid var(--ink);border-radius:12px;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
  .invcell.on{background:var(--sun)}
  .invcell:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
  .mcard{width:min(400px,90vw);text-align:center;position:relative}
  .rooms{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .roombtn{display:flex;align-items:center;gap:12px;padding:14px;border:3px solid var(--ink);border-radius:16px;background:#fff;cursor:pointer;box-shadow:0 4px 0 var(--ink);font-weight:600;font-size:16px;color:var(--ink)}
  .roombtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
  .roomdot{width:26px;height:26px;border-radius:8px;border:3px solid var(--ink);flex:0 0 auto}
  .c4modal{position:absolute;inset:0;z-index:21;display:flex;align-items:center;justify-content:center;background:transparent}
  .c4card{position:relative;background:var(--cream);border:4px solid var(--ink);border-radius:22px;padding:16px;box-shadow:0 12px 0 var(--ink);max-width:96vw}
  .c4close{position:absolute;top:-12px;right:-12px;width:30px;height:30px;border-radius:50%;border:3px solid var(--ink);background:#fff;color:var(--ink);font-weight:700;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
  .c4head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
  .c4p{display:flex;align-items:center;gap:6px;padding:4px 10px;border:3px solid var(--ink);border-radius:14px;background:#fff;font-size:14px;font-weight:600;color:var(--ink)}
  .c4p.turn{background:var(--sun)}
  .c4vs{font-weight:700;color:#8a76c4}
  .c4dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--ink)}
  .c4board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:#4a3aa0;border:4px solid var(--ink);border-radius:16px;padding:8px}
  .c4cell{width:40px;height:40px;border-radius:50%;background:#1c1442;border:3px solid var(--ink);cursor:pointer}
  .c4board.locked .c4cell{cursor:default}
  .c4status{text-align:center;font-weight:600;margin-top:10px;color:var(--ink);min-height:22px}
  .c4wait{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);z-index:19;background:var(--cream);border:3px solid var(--ink);border-radius:16px;padding:10px 14px;box-shadow:0 4px 0 var(--ink);font-weight:600;color:var(--ink);display:flex;gap:12px;align-items:center}
  .c4wait button{font-family:inherit;font-weight:600;border:3px solid var(--ink);border-radius:12px;background:#ff5ea8;color:#fff;padding:5px 10px;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
  .menucard{width:250px;text-align:center}
  .menucard h2{margin:0 0 2px;color:var(--grape);font-size:20px}
  .menusub{color:#8a76c4;font-weight:600;font-size:13px;margin-bottom:14px}
  .menucard .go{margin-bottom:10px}
  .lbcard{width:330px;max-width:92vw}
  .lbcard h2{margin:0 0 12px;color:var(--grape);font-size:20px;text-align:center}
  .lbrow{display:flex;align-items:center;gap:10px;padding:7px 6px;border-bottom:2px solid #e7dcff;font-weight:600;color:var(--ink)}
  .lbrank{width:26px;height:26px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--sun);border:2px solid var(--ink);border-radius:8px;font-size:13px}
  .lbname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbwins{font-size:13px}
  .lbstar{font-size:12px;color:#8a76c4}
  .lbempty{color:#8a76c4;text-align:center;padding:14px;font-weight:600}
  .freqbadge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 4px;background:#ff5ea8;color:#fff;border:2px solid var(--ink);border-radius:9px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .fcard{width:300px;max-width:92vw;text-align:left}
  .fh{margin:0 0 12px;color:var(--grape);font-size:20px;text-align:center}
  .faddrow{display:flex;gap:8px;margin-bottom:6px}
  .finp{flex:1;min-width:0;background:#fff;border:3px solid var(--ink);color:var(--ink);border-radius:12px;padding:8px 12px;font:inherit;font-size:14px;font-weight:500;outline:none}
  .fmsg{font-size:12px;font-weight:600;color:#8a76c4;min-height:16px;margin-bottom:4px}
  .fsec{font-size:12px;font-weight:700;color:#8a76c4;margin:10px 0 4px}
  .frow{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:2px solid #e7dcff}
  .fname{flex:1;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fon{width:9px;height:9px;border-radius:50%;border:2px solid var(--ink);flex:0 0 auto}
  .fbtn{font-family:inherit;font-weight:600;font-size:12px;border:2px solid var(--ink);border-radius:10px;padding:4px 9px;cursor:pointer;background:#fff;color:var(--ink);box-shadow:0 2px 0 var(--ink)}
  .fbtn.ok{background:var(--mint)}.fbtn.no{background:#ff5ea8;color:#fff}.fbtn.chat{background:var(--sky)}
  .fempty{color:#8a76c4;font-size:13px;padding:6px 2px}
  .dmcard{width:320px;max-width:92vw;display:flex;flex-direction:column;height:min(70vh,460px)}
  .dmhead{font-weight:700;color:var(--grape);font-size:17px;margin-bottom:8px;text-align:center}
  .dmlog{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:4px}
  .dmmsg{max-width:78%;padding:7px 11px;border:3px solid var(--ink);border-radius:14px;font-size:14px;font-weight:500;word-break:break-word}
  .dmmsg.me{align-self:flex-end;background:var(--sky)}
  .dmmsg.them{align-self:flex-start;background:#fff}
  .dmbar{display:flex;gap:8px;margin-top:8px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="logo">Nebula<b>·</b>Station</div>
    <div class="spacer"></div>
    <div class="pill"><span class="orb-ico"></span><span id="orbs">0</span></div>
    <div class="pill"><span id="dot"></span><span id="online">0</span></div>
    <button class="btn" id="mapBtn" title="Karte">🗺️</button>
    <button class="btn" id="friendsBtn" title="Freunde" style="position:relative">👥<span id="freqbadge" class="freqbadge" style="display:none">0</span></button>
    <button class="btn" id="meBtn" title="Mein Profil">🙂</button>
    <button class="btn acc" id="accBtn" title="Accessoire">🎩</button>
    <button class="btn" id="outBtn" title="Abmelden">⎋</button>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="room-name">Hauptdeck</div>
    <div id="chatlog"></div>
  </div>
  <div id="emotes"></div>
  <div id="bar">
    <input id="chatin" maxlength="120" placeholder="Sag was Nettes…" autocomplete="off">
    <button class="btn" id="send">Senden</button>
  </div>
</div>

<!-- Login / Registrieren -->
<div id="auth" class="overlay" style="display:none">
  <div class="card">
    <h1>Nebula<b>·</b>Station</h1>
    <p id="authsub">Melde dich an, um anzudocken</p>
    <div class="tabs">
      <button id="tabLogin" class="tab on">Einloggen</button>
      <button id="tabReg" class="tab">Registrieren</button>
    </div>
    <input id="email" class="inp" type="email" placeholder="E-Mail" autocomplete="email">
    <input id="pass" class="inp" type="password" placeholder="Passwort (min. 6 Zeichen)" autocomplete="current-password">
    <input id="uname" class="inp" placeholder="Spielername" maxlength="14" style="display:none">
    <div id="autherr" class="err"></div>
    <button id="authBtn" class="btn go">Einloggen</button>
  </div>
</div>

<!-- Alien-Auswahl (nur beim ersten Login) -->
<div id="intro" class="overlay" style="display:none">
  <div class="card">
    <h1>Willkommen!</h1>
    <p id="introsub">Wähl dein Alien</p>
    <label>Spezies</label>
    <div class="species" id="spc"></div>
    <label>Farbe</label>
    <div class="swatches" id="sw"></div>
    <button class="btn go" id="enter">Andocken</button>
  </div>
</div>

<!-- Profilkarte (klein, schwebend, transparenter Hintergrund) -->
<div id="profile" class="pmodal" style="display:none">
  <div class="pcard">
    <button class="pclose" id="pclose">✕</button>
    <div class="phead">
      <canvas id="pcanvas" width="96" height="104"></canvas>
      <div class="pmeta">
        <span class="pbadge">PILOT</span>
        <div class="pname" id="pname">Name</div>
        <div class="pcoins"><span class="coinico"></span><span id="pcoins">0</span></div>
      </div>
    </div>
    <button class="invtoggle" id="invtoggle"><span>Inventar öffnen</span><span class="invarrow" id="invarrow">▸</span></button>
    <button class="invtoggle" id="pfriend" style="display:none;justify-content:center">➕ Freund hinzufügen</button>
    <div class="pinv" id="pinv" style="display:none"></div>
  </div>
</div>

<!-- Karte -->
<div id="map" class="overlay" style="display:none">
  <div class="card mcard">
    <button class="pclose" id="mclose">✕</button>
    <h1>Karte</h1>
    <p>Wohin möchtest du?</p>
    <div class="rooms" id="rooms"></div>
  </div>
</div>

<!-- Freunde -->
<div id="friends" class="pmodal" style="display:none">
  <div class="pcard fcard">
    <button class="pclose" id="fclose">✕</button>
    <h2 class="fh">👥 Freunde</h2>
    <div class="faddrow">
      <input id="faddinput" class="finp" placeholder="Spielername…" maxlength="14" autocomplete="off">
      <button class="btn" id="faddbtn">Anfrage</button>
    </div>
    <div id="fmsg" class="fmsg"></div>
    <div id="freqwrap" style="display:none"><div class="fsec">Anfragen</div><div id="freqs"></div></div>
    <div class="fsec">Deine Freunde</div>
    <div id="flist"></div>
  </div>
</div>

<!-- Privater Chat -->
<div id="dm" class="pmodal" style="display:none">
  <div class="pcard dmcard">
    <button class="pclose" id="dmclose">✕</button>
    <div class="dmhead" id="dmhead">Chat</div>
    <div class="dmlog" id="dmlog"></div>
    <div class="dmbar">
      <input id="dminput" class="finp" placeholder="Nachricht…" maxlength="300" autocomplete="off">
      <button class="btn" id="dmsend">➤</button>
    </div>
  </div>
</div>

<!-- 4 Gewinnt: Auswahlmenü am Tisch -->
<div id="c4menu" class="pmodal" style="display:none">
  <div class="pcard menucard">
    <button class="pclose" id="c4mclose">✕</button>
    <h2>4 Gewinnt</h2>
    <div class="menusub" id="c4mtable">Tisch 1</div>
    <button class="btn go" id="c4mplay">🎮 Spiel suchen</button>
    <button class="btn go" id="c4mlb" style="background:var(--sun)">🏆 Bestenliste</button>
  </div>
</div>

<!-- Bestenliste -->
<div id="lb" class="pmodal" style="display:none">
  <div class="pcard lbcard">
    <button class="pclose" id="lbclose">✕</button>
    <h2>🏆 Bestenliste</h2>
    <div id="lblist"></div>
  </div>
</div>

<!-- 4 Gewinnt: Warte-Banner -->
<div id="c4wait" class="c4wait" style="display:none">
  <span>Warte auf Gegenspieler…</span>
  <button id="c4cancel">Abbrechen</button>
</div>

<!-- 4 Gewinnt: Spielansicht -->
<div id="c4modal" class="c4modal" style="display:none">
  <div class="c4card">
    <button class="c4close" id="c4close">✕</button>
    <div class="c4head">
      <div class="c4p" id="c4pa"><span class="c4dot" id="c4da"></span><span id="c4na">A</span></div>
      <span class="c4vs">4 GEWINNT</span>
      <div class="c4p" id="c4pb"><span class="c4dot" id="c4db"></span><span id="c4nb">B</span></div>
    </div>
    <div class="c4board" id="c4board"></div>
    <div class="c4status" id="c4status"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
"use strict";
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ============================================================
   NEBULA STATION — Client mit Login (Supabase) + Multiplayer
   ============================================================ */
const cv=document.getElementById('cv');let ctx=cv.getContext('2d');const chatlog=document.getElementById('chatlog');
const W=1040,H=620; let scale=1,offX=0,offY=0;
function resize(){const r=cv.parentElement.getBoundingClientRect();const dpr=Math.min(devicePixelRatio||1,2);
  cv.width=r.width*dpr;cv.height=r.height*dpr;scale=Math.min(r.width/W,r.height/H);
  offX=(r.width-W*scale)/2;offY=(r.height-H*scale)/2;ctx.setTransform(dpr,0,0,dpr,0,0);}
addEventListener('resize',resize);

const COLORS=['#4dd0ff','#ff5ea8','#ffb14d','#7be0b0','#b18cff','#ffe15e'];
const INK='#2b1b52';
const SPECIES=['blobbi','knuffo','slink','zacki','nebli'];

  deck:{name:'Hauptdeck',accent:'#4dd0ff',wall1:'#4a3aa0',wall2:'#382a80',floor1:'#efe4ff',floor2:'#ddceff',
    door:{x:970,y:360,to:'obs',label:'Aussichtsdeck →'},
    deco:[{t:'console',x:160,y:250},{t:'crate',x:262,y:262},{t:'crate',x:238,y:290},{t:'holo',x:520,y:250},{t:'vending',x:735,y:236},{t:'plant',x:905,y:272},{t:'plant',x:70,y:330}]},

};

const players={}; let myId=null, me=null, spawned=false;
const pref={color:COLORS[0],species:'blobbi'};

function addPlayer(p){if(players[p.id]){Object.assign(players[p.id],p);return;}
  players[p.id]={...p,tx:p.x,ty:p.y,step:0,moving:false,bubble:null,bubbleT:0,expr:'happy',exprT:0,emo:null,emoT:0,sitting:!!p.sitting,sitAnim:0};}
function myRoom(){return me?me.room:'deck';}
function updateOnline(){document.getElementById('online').textContent=Object.values(players).filter(p=>p.room===myRoom()).length;}

/* ---------------- LOGIN / SUPABASE ---------------- */
let supabase=null, socket=null;
const $=id=>document.getElementById(id);
let mode='login';
function showAuth(msg){$('auth').style.display='flex';$('intro').style.display='none';if(msg)$('autherr').textContent=msg;}
function setMode(m){mode=m;$('tabLogin').classList.toggle('on',m==='login');$('tabReg').classList.toggle('on',m==='reg');
  $('uname').style.display=m==='reg'?'block':'none';$('authBtn').textContent=m==='reg'?'Konto erstellen':'Einloggen';$('autherr').textContent='';}
$('tabLogin').onclick=()=>setMode('login');
$('tabReg').onclick=()=>setMode('reg');
$('authBtn').onclick=doAuth;
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
$('outBtn').onclick=async()=>{if(supabase)await supabase.auth.signOut();location.reload();};

async function initAuth(){
  try{
    const cfg=await fetch('/config').then(r=>r.json());
    if(!cfg.url||!cfg.anonKey){showAuth('Server ist noch nicht mit Supabase verbunden (Umgebungsvariablen fehlen).');return;}
    supabase=createClient(cfg.url,cfg.anonKey);
    const {data:{session}}=await supabase.auth.getSession();
    if(session){connectGame(session.access_token);} else {showAuth();}
  }catch(e){showAuth('Verbindung zum Server fehlgeschlagen.');}
}
async function doAuth(){
  $('autherr').textContent='';
  const email=$('email').value.trim(),pass=$('pass').value;
  if(!email||!pass){$('autherr').textContent='Bitte E-Mail und Passwort eingeben.';return;}
  $('authBtn').disabled=true;
  try{
    if(mode==='reg'){
      const username=($('uname').value.trim())||'Alien';
      const {data,error}=await supabase.auth.signUp({email,password:pass,options:{data:{username}}});
      if(error)throw error;
      if(data.session){connectGame(data.session.access_token);}
      else{$('autherr').style.color='#7be0b0';$('autherr').textContent='Fast fertig! Bestätige die E-Mail und logg dich dann ein.';setMode('login');}
    }else{
      const {data,error}=await supabase.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      connectGame(data.session.access_token);
    }
  }catch(err){$('autherr').style.color='#e0396b';$('autherr').textContent=(err&&err.message)||'Anmeldung fehlgeschlagen.';}
  $('authBtn').disabled=false;
}
function connectGame(token){
  $('auth').style.display='none';
  socket=window.io({auth:{token}});
  wireSocket();
}

/* ---------------- SOCKET ---------------- */
function wireSocket(){
  socket.on('connect',()=>{myId=socket.id;});
  socket.on('connect_error',err=>{showAuth('Sitzung abgelaufen, bitte neu einloggen.');});
  socket.on('needs-setup',({username})=>{$('intro').style.display='flex';$('introsub').textContent='Hallo '+username+'! Wähl dein Alien';});
  socket.on('spawn',prof=>{$('auth').style.display='none';$('intro').style.display='none';spawned=true;
    document.getElementById('orbs').textContent=prof.stardust||0;
    addMsg('','','Willkommen an Bord, '+prof.name+'!  (Emotes = Tasten 1-6 · Hut = Accessoire)','sys');});
  socket.on('stardust',d=>{document.getElementById('orbs').textContent=d.value;if(me)me.stardust=d.value;});
  socket.emit('friends-list');
  socket.on('world',all=>{for(const id in all)addPlayer(all[id]);me=players[myId]||me;updateOnline();});
  socket.on('player-joined',p=>{addPlayer(p);updateOnline();});
  socket.on('player-left',id=>{delete players[id];updateOnline();});
  socket.on('player-moved',d=>{const p=players[d.id];if(p){p.tx=d.x;p.ty=d.y;p.face=d.face;}});
  socket.on('player-room',d=>{const p=players[d.id];if(p){p.room=d.room;p.x=p.tx=d.x;p.y=p.ty=d.y;}updateOnline();});
  socket.on('player-acc',d=>{const p=players[d.id];if(p)p.acc=d.acc;});
  socket.on('player-emote',d=>{const p=players[d.id];if(p){p.emo=d.icon;p.emoT=2.4;p.expr=d.expr;p.exprT=2.4;}});
  socket.on('chat',m=>{addMsg(m.name,m.color,m.text,m.id===myId?'me':'');const p=players[m.id];if(p){p.bubble=m.text;p.bubbleT=4;}});
  socket.on('system',t=>addMsg('','',t,'sys'));
  socket.on('c4-waiting',()=>{$('c4wait').style.display='flex';});
  socket.on('c4-busy',()=>{locked=false;sitTable=-1;addMsg('','','Dieser Tisch ist gerade besetzt.','sys');});
  socket.on('c4-cancel',()=>{$('c4wait').style.display='none';cg=null;locked=false;sitTable=-1;addMsg('','','4-Gewinnt abgebrochen.','sys');});
  socket.on('c4-start',d=>{$('c4wait').style.display='none';
    cg={board:d.board,turn:d.turn,seat:d.seat,a:d.a,b:d.b,over:false};
    $('c4na').textContent=d.a.name;$('c4nb').textContent=d.b.name;
    $('c4da').style.background=d.a.color;$('c4db').style.background=d.b.color;
    buildC4();updateC4();$('c4modal').style.display='flex';});
  socket.on('c4-update',d=>{if(!cg)return;cg.board=d.board;cg.turn=d.turn;updateC4();});
  socket.on('c4-over',d=>{if(!cg)return;cg.board=d.board;cg.over=true;cg.turn=-1;updateC4();showC4Result(d);locked=false;sitTable=-1;});
  socket.on('player-sit',d=>{const p=players[d.id];if(p){if(d.sitting&&!p.sitting)p.sitAnim=1;p.sitting=d.sitting;}});
  socket.on('leaderboard-data',d=>{renderLeaderboard(d.rows||[]);});
  socket.on('friend-msg',d=>{$('fmsg').style.color=d.ok?'#3aa06a':'#e0396b';$('fmsg').textContent=d.text;if(d.ok)socket.emit('friends-list');});
  socket.on('friend-refresh',()=>{socket.emit('friends-list');});
  socket.on('friends-data',d=>renderFriends(d));
  socket.on('dm-in',d=>{if(dmWith&&dmWith.id===d.fromId)appendDM('them',d.text);else addMsg('','','📩 Neue private Nachricht – öffne 👥 Freunde','sys');});
  socket.on('dm-history-data',d=>{if(dmWith&&dmWith.id===d.withId)renderDMHistory(d.messages);});
}

/* ---------------- CHAT / EMOTE / ACC ---------------- */
function addMsg(name,color,text,cls=''){const d=document.createElement('div');d.className='msg '+cls;
  if(cls==='sys')d.textContent=text;else d.innerHTML=`<b style="color:${color}">${esc(name)}</b> ${esc(text)}`;
  chatlog.appendChild(d);while(chatlog.children.length>30)chatlog.removeChild(chatlog.firstChild);}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const chatin=document.getElementById('chatin');
function sendChat(){const t=chatin.value.trim();if(!t||!socket)return;socket.emit('chat',t);chatin.value='';}
document.getElementById('send').onclick=sendChat;
chatin.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
const emoBar=document.getElementById('emotes');
EMOTES.forEach((em,i)=>{const b=document.createElement('div');b.className='emo';b.textContent=em.icon;b.title='Taste '+(i+1);
  b.onclick=()=>socket&&socket.emit('emote',em);emoBar.appendChild(b);});
addEventListener('keydown',e=>{if(document.activeElement===chatin)return;const n=parseInt(e.key);if(n>=1&&n<=EMOTES.length&&socket)socket.emit('emote',EMOTES[n-1]);});
document.getElementById('accBtn').onclick=()=>{if(!me||!socket)return;const i=ACCS.indexOf(me.acc);socket.emit('acc',{acc:ACCS[(i+1)%ACCS.length]});};

/* ---------------- ORBS (kosmetisch) ---------------- */
let orbs=[],score=0;
function seedOrbs(){orbs=[];for(let i=0;i<5;i++)orbs.push(randOrb());}
function randOrb(){return{x:200+Math.random()*640,y:280+Math.random()*250,t:Math.random()*6.28};}

/* ---------------- BEWEGUNG ---------------- */
function toWorld(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left-offX)/scale,y:(cy-r.top-offY)/scale};}
cv.addEventListener('pointerdown',e=>{if(!me)return;if(document.activeElement===chatin)chatin.blur();
  if(locked)return;
  const p=toWorld(e.clientX,e.clientY);
  if(myRoom()==='obs'){const ti=C4_TABLES.findIndex(t=>Math.hypot(t.x-p.x,t.y-p.y)<t.r);
    if(ti>=0){openC4Menu(ti);return;}}
  const hit=Object.values(players).filter(q=>q.room===myRoom()).find(q=>Math.hypot(q.x-p.x,q.y-p.y)<26);
  if(hit){openProfile(hit);return;}
  me.tx=clamp(p.x,80,W-80);me.ty=clamp(p.y,250,H-40);});
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function checkDoor(){if(!me)return;const d=ROOMS[me.room].door;if(Math.hypot(me.x-d.x,me.y-d.y)<52)goToRoom(d.to);}
function goToRoom(room){if(!me||locked||room===me.room)return;me.room=room;const nd=ROOMS[room].door;
  me.x=me.tx=nd.x>W/2?nd.x-140:nd.x+140;me.y=me.ty=nd.y;
  socket&&socket.emit('room',{room:me.room,x:me.x,y:me.y});
  document.getElementById('room-name').textContent=ROOMS[room].name;
  addMsg('','','Du bist im '+ROOMS[room].name+'.','sys');updateOnline();}

let last=performance.now(),lastSent=0;
function update(dt,now){
  for(const id in players)moveEnt(players[id],dt);
  if(me&&spawned){checkDoor();
    if(pendingSit&&Math.hypot(me.x-me.tx,me.y-me.ty)<10){pendingSit=false;socket&&socket.emit('c4-sit',{table:sitTable});}
    for(const o of orbs){o.t+=dt*3;if(me.room==='deck'&&Math.hypot(me.x-o.x,me.y-o.y)<38){socket&&socket.emit('collect');Object.assign(o,randOrb());}}
    if(now-lastSent>66){socket&&socket.emit('move',{x:me.x,y:me.y,face:me.face});lastSent=now;}}
  for(const id in players){const e=players[id];
    if(e.bubbleT>0){e.bubbleT-=dt;if(e.bubbleT<=0)e.bubble=null;}
    if(e.emoT>0){e.emoT-=dt;if(e.emoT<=0)e.emo=null;}if(e.exprT>0){e.exprT-=dt;if(e.exprT<=0)e.expr='happy';}
    if(e.sitAnim>0){e.sitAnim-=dt*2;if(e.sitAnim<0)e.sitAnim=0;}}
}
function moveEnt(e,dt){const dx=e.tx-e.x,dy=e.ty-e.y,d=Math.hypot(dx,dy);
  if(d>2){const m=Math.min(205*dt,d);e.x+=dx/d*m;e.y+=dy/d*m;if(Math.abs(dx)>.5)e.face=dx<0?-1:1;e.step+=dt*11;e.moving=true;}else{e.step*=.85;e.moving=false;}}

/* ---------------- RENDER (unverändert) ---------------- */
function render(){const r=cv.parentElement.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);
  ctx.save();ctx.translate(offX,offY);ctx.scale(scale,scale);
  const room=ROOMS[myRoom()];
  drawWall(room);drawFloor(room);drawDoor(room.door,room.accent);
  if(myRoom()==='obs')C4_TABLES.forEach((t,i)=>drawC4Table(t.x,t.y,i));
  if(myRoom()==='deck')for(const o of orbs)drawOrb(o);
  const here=Object.values(players).filter(p=>p.room===myRoom()).sort((a,b)=>a.y-b.y);
  for(const e of here)drawAvatar(e);
  ctx.restore();}
let stars=null,neb=null;
function drawWall(room){const g=ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,room.wall1);g.addColorStop(1,room.wall2);ctx.fillStyle=g;ctx.fillRect(0,0,W,220);
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(0,16);ctx.lineTo(W,16);ctx.stroke();
  ctx.strokeStyle=shade(room.wall1,25);ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,14);ctx.lineTo(W,14);ctx.stroke();
  for(let x=60;x<W;x+=120){ctx.fillStyle=shade(room.wall1,-20);roundRect(x-6,8,12,14,3);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=3;for(let x=0;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,30);ctx.lineTo(x,200);ctx.stroke();}
  if(room===ROOMS.deck)drawViewport(W/2-210,44,420,150,room.accent);else drawViewport(80,44,W-160,150,room.accent);
  drawWallScreen(80,66,room.accent);drawWallScreen(W-180,66,room.accent);drawLamp(300,0);drawLamp(760,0);
  ctx.font='700 15px Fredoka';ctx.textAlign='center';const t=room.name.toUpperCase(),tw=ctx.measureText(t).width;
  ctx.fillStyle=room.accent;ctx.strokeStyle=INK;ctx.lineWidth=3;roundRect(W/2-tw/2-14,198,tw+28,22,11);ctx.fill();ctx.stroke();ctx.fillStyle=INK;ctx.fillText(t,W/2,213);}
function drawViewport(x,y,w,h,accent){ctx.save();roundRect(x,y,w,h,18);ctx.clip();
  const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'#241a5c');g.addColorStop(1,'#0e0930');ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  if(!neb)neb=[{dx:.2,dy:.4,r:.5,c:'#ff5ea8'},{dx:.75,dy:.3,r:.55,c:'#4dd0ff'},{dx:.5,dy:.6,r:.4,c:'#b18cff'}];
  for(const n of neb){const cx=x+w*n.dx,cy=y+h*n.dy,rr=h*n.r;const rg=ctx.createRadialGradient(cx,cy,4,cx,cy,rr);rg.addColorStop(0,n.c+'50');rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cy,rr,0,7);ctx.fill();}
  if(!stars){stars=[];for(let i=0;i<34;i++)stars.push({rx:Math.random(),ry:Math.random(),s:Math.random()*6+3,t:Math.random()*6});}
  const now=performance.now()/1000;for(const s of stars){const tw=.6+.4*Math.sin(now*2+s.t);sparkle(x+w*s.rx,y+h*s.ry,s.s*tw);}
  drawPlanet(x+w*.78,y+h*.42,accent);
  const t=(now*.35)%3;if(t<1){const sx=x+w*(1-t),sy=y+20+t*40;ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+34,sy-14);ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,3,0,7);ctx.fill();}
  ctx.restore();
  ctx.strokeStyle=INK;ctx.lineWidth=6;roundRect(x,y,w,h,18);ctx.stroke();
  ctx.strokeStyle=INK;ctx.lineWidth=4;for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(x+w*i/3,y);ctx.lineTo(x+w*i/3,y+h);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(x,y+h/2);ctx.lineTo(x+w,y+h/2);ctx.stroke();
  ctx.fillStyle=accent;[[x+10,y+10],[x+w-10,y+10],[x+10,y+h-10],[x+w-10,y+h-10]].forEach(([a,b])=>{ctx.beginPath();ctx.arc(a,b,4,0,7);ctx.fill();ctx.strokeStyle=INK;ctx.lineWidth=2;ctx.stroke();});}
function sparkle(x,y,s){ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(x,y-s);ctx.quadraticCurveTo(x,y,x+s,y);ctx.quadraticCurveTo(x,y,x,y+s);ctx.quadraticCurveTo(x,y,x-s,y);ctx.quadraticCurveTo(x,y,x,y-s);ctx.fill();}
function drawPlanet(x,y,accent){ctx.strokeStyle=accent;ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(x,y,58,18,-.35,Math.PI*.12,Math.PI*.98);ctx.stroke();
  ctx.fillStyle='#ffb14d';ctx.strokeStyle=INK;ctx.lineWidth=4;ctx.beginPath();ctx.arc(x,y,34,0,7);ctx.fill();ctx.stroke();
  ctx.fillStyle='#ff9e3d';[[x-12,y-6,8],[x+11,y+6,6],[x-2,y+13,5]].forEach(([a,b,c])=>{ctx.beginPath();ctx.arc(a,b,c,0,7);ctx.fill();});
  ctx.strokeStyle=accent;ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(x,y,58,18,-.35,Math.PI*1.02,Math.PI*1.9);ctx.stroke();
  ctx.fillStyle=INK;ctx.beginPath();ctx.arc(x-9,y-3,3,0,7);ctx.fill();ctx.beginPath();ctx.arc(x+9,y-3,3,0,7);ctx.fill();
  ctx.strokeStyle=INK;ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.arc(x,y+1,10,.15*Math.PI,.85*Math.PI);ctx.stroke();}
function drawWallScreen(x,y,accent){ctx.fillStyle='#1c1442';ctx.strokeStyle=INK;ctx.lineWidth=4;roundRect(x,y,100,66,10);ctx.fill();ctx.stroke();
  const now=performance.now()/220;for(let i=0;i<5;i++){const h=14+Math.abs(Math.sin(now+i))*30;ctx.fillStyle=i%2?accent:'#7be0b0';roundRect(x+10+i*17,y+56-h,11,h,3);ctx.fill();}}
function drawLamp(x,y){ctx.fillStyle=INK;roundRect(x-14,y,28,10,4);ctx.fill();
  ctx.fillStyle='#fff6c8';ctx.beginPath();ctx.moveTo(x-14,y+10);ctx.lineTo(x+14,y+10);ctx.lineTo(x+30,y+60);ctx.lineTo(x-30,y+60);ctx.closePath();ctx.globalAlpha=.18;ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#ffe15e';ctx.beginPath();ctx.ellipse(x,y+10,10,4,0,0,7);ctx.fill();}
function drawFloor(room){const top=196;ctx.fillStyle=room.floor1;ctx.strokeStyle=INK;ctx.lineWidth=6;roundRect(20,top,W-40,H-top-16,36);ctx.fill();ctx.stroke();
  ctx.fillStyle=room.floor2;for(let x=70;x<W-40;x+=66)for(let y=top+50;y<H-26;y+=66){ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();}
  ctx.strokeStyle=room.accent;ctx.lineWidth=6;ctx.setLineDash([16,13]);ctx.beginPath();ctx.ellipse(W/2,H/2+90,170,60,0,0,7);ctx.stroke();ctx.setLineDash([]);
  for(const d of [...room.deco].sort((a,b)=>a.y-b.y))DECO[d.t]&&DECO[d.t](d.x,d.y,room.accent);}
const DECO={
  crate(x,y){ctx.fillStyle='#c99a5b';ctx.strokeStyle=INK;ctx.lineWidth=4;roundRect(x-22,y-22,44,44,8);ctx.fill();ctx.stroke();
    ctx.strokeStyle=shade('#c99a5b',-40);ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x-22,y-8);ctx.lineTo(x+22,y-8);ctx.moveTo(x-22,y+8);ctx.lineTo(x+22,y+8);ctx.stroke();
    ctx.fillStyle='#ffd166';ctx.strokeStyle=INK;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();ctx.stroke();},
  plant(x,y){ctx.fillStyle='#8a5a3a';ctx.strokeStyle=INK;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x-14,y+2);ctx.lineTo(x+14,y+2);ctx.lineTo(x+10,y+24);ctx.lineTo(x-10,y+24);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#7be0b0';[[-8,-18,-.5],[8,-20,.5],[0,-30,0]].forEach(([a,b,r])=>{ctx.save();ctx.translate(x+a,y+b);ctx.rotate(r);ctx.beginPath();ctx.ellipse(0,0,7,16,0,0,7);ctx.fill();ctx.stroke();ctx.restore();});
    ctx.fillStyle='#ffe15e';[[-8,-30],[8,-32],[0,-42]].forEach(([a,b])=>{ctx.beginPath();ctx.arc(x+a,y+b,3,0,7);ctx.fill();});},
  console(x,y,accent){ctx.fillStyle='#3a2f7a';ctx.strokeStyle=INK;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x-34,y+26);ctx.lineTo(x-28,y-16);ctx.lineTo(x+28,y-16);ctx.lineTo(x+34,y+26);ctx.closePath();ctx.fill();ctx.stroke();

const ITEM_ICON={none:'🚫',party:'🎉',crown:'👑',phones:'🎧',shades:'🕶️'};
const INV_ITEMS=[{id:'none',label:'Nichts'},{id:'party',label:'Partyhut'},{id:'crown',label:'Krone'},{id:'phones',label:'Kopfhörer'},{id:'shades',label:'Sonnenbrille'}];
let profileName=null;
function openProfile(pl){
  const own=pl.id===myId;profileName=pl.name;
  $('pname').textContent=pl.name||'Alien';
  $('pcoins').textContent=(own?(me&&me.stardust)||0:(pl.stardust||0));
  $('pinv').style.display='none';
  $('invarrow').classList.remove('open');
  $('invtoggle').firstElementChild.textContent='Inventar öffnen';
  $('invtoggle').style.display=own?'flex':'none';
  $('pfriend').style.display=own?'none':'flex';
  renderPreview(pl);if(own)buildInventory(pl);
  $('profile').style.display='flex';
}
function closeProfile(){$('profile').style.display='none';}
function renderPreview(pl){
  const pc=$('pcanvas'),CSSW=96,CSSH=104,dpr=Math.min(devicePixelRatio||1,3);
  pc.width=CSSW*dpr;pc.height=CSSH*dpr;                 // hochauflösendes Backing
  const g=pc.getContext('2d');const main=ctx;ctx=g;
  g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,CSSW,CSSH);
  const fake=Object.assign({},pl,{x:CSSW/2,y:CSSH/2+14,step:0,moving:false,bubble:null,emo:null,expr:'happy',face:1});
  const m=drawBody(fake,fake.x,fake.y,1,false);
  g.fillStyle='rgba(255,94,168,.5)';g.beginPath();g.arc(fake.x-m.spread-4,m.eyeY+7,4,0,7);g.fill();g.beginPath();g.arc(fake.x+m.spread+4,m.eyeY+7,4,0,7);g.fill();
  drawFace(fake,fake.x,m);drawAcc(fake.acc,fake.x,m,1);
  ctx=main;
}
function buildInventory(pl){
  const inv=$('pinv');inv.innerHTML='';const own=pl.id===myId;
  for(const it of INV_ITEMS){const cell=document.createElement('div');
    cell.className='invcell'+(pl.acc===it.id?' on':'');cell.textContent=ITEM_ICON[it.id];cell.title=it.label;
    if(own){cell.onclick=()=>{socket&&socket.emit('acc',{acc:it.id});pl.acc=it.id;buildInventory(pl);renderPreview(pl);};}
    inv.appendChild(cell);}
}
$('pclose').onclick=closeProfile;
$('profile').onclick=e=>{if(e.target.id==='profile')closeProfile();};
$('meBtn').onclick=()=>{if(me)openProfile(me);};
$('invtoggle').onclick=()=>{const inv=$('pinv');const open=inv.style.display==='none';
  inv.style.display=open?'grid':'none';
  $('invarrow').classList.toggle('open',open);
  $('invtoggle').firstElementChild.textContent=open?'Inventar schließen':'Inventar öffnen';};

function renderLeaderboard(rows){const el=$('lblist');el.innerHTML='';
  if(!rows.length){el.innerHTML='<div class="lbempty">Noch keine Siege – sei der Erste! 🏆</div>';return;}
  rows.forEach((r,i)=>{const row=document.createElement('div');row.className='lbrow';
    row.innerHTML='<span class="lbrank">'+(i+1)+'</span><span class="lbname">'+esc(r.username||'Alien')+'</span><span class="lbwins">🏆 '+(r.wins||0)+'</span><span class="lbstar">✦ '+(r.game_stardust||0)+'</span>';
    el.appendChild(row);});}
function buildC4(){const bd=$('c4board');bd.innerHTML='';
  for(let i=0;i<42;i++){const c=document.createElement('div');c.className='c4cell';c.dataset.col=i%7;
    c.onclick=()=>{if(!cg||cg.over||cg.turn!==cg.seat)return;socket&&socket.emit('c4-drop',{col:+c.dataset.col});};
    bd.appendChild(c);}}
function updateC4(){if(!cg)return;const cells=$('c4board').children;
  for(let r=0;r<6;r++)for(let col=0;col<7;col++){const v=cg.board[r][col];const cell=cells[r*7+col];
    cell.style.background = v===0?'#1c1442' : (v===1?cg.a.color:cg.b.color);}
  $('c4pa').classList.toggle('turn',cg.turn===0);
  $('c4pb').classList.toggle('turn',cg.turn===1);
  $('c4board').classList.toggle('locked',cg.over||cg.turn!==cg.seat);
  if(!cg.over)$('c4status').textContent = cg.turn===cg.seat?'Du bist dran – wähl eine Spalte!':'Gegner ist am Zug…';}
function showC4Result(d){
  let msg;
  if(d.winnerSeat===-1)msg='Unentschieden!';
  else if(d.winnerSeat===cg.seat)msg=(d.reason==='forfeit'?'Gegner hat aufgegeben – ':'')+'Gewonnen! +25 ✦';
  else msg='Verloren – nächstes Mal! 🙃';
  $('c4status').textContent=msg;}
function c4CloseView(){if(cg&&!cg.over)socket&&socket.emit('c4-leave');$('c4modal').style.display='none';cg=null;locked=false;sitTable=-1;}
$('c4close').onclick=c4CloseView;
$('c4cancel').onclick=()=>{socket&&socket.emit('c4-leave');$('c4wait').style.display='none';cg=null;locked=false;sitTable=-1;};
$('c4mclose').onclick=()=>$('c4menu').style.display='none';
$('c4menu').onclick=e=>{if(e.target.id==='c4menu')$('c4menu').style.display='none';};
$('c4mplay').onclick=()=>{$('c4menu').style.display='none';requestSit(menuTable);};
$('c4mlb').onclick=()=>{$('c4menu').style.display='none';socket&&socket.emit('leaderboard');$('lblist').innerHTML='<div class="lbempty">Lade…</div>';$('lb').style.display='flex';};
$('lbclose').onclick=()=>$('lb').style.display='none';
$('lb').onclick=e=>{if(e.target.id==='lb')$('lb').style.display='none';};

function drawC4Table(x,y,i){
  // Schild
  ctx.font='700 12px Fredoka';ctx.textAlign='center';const t='TISCH '+(i+1),tw=ctx.measureText(t).width;
  ctx.fillStyle='#ffd166';ctx.strokeStyle=INK;ctx.lineWidth=3;roundRect(x-tw/2-10,y-72,tw+20,22,11);ctx.fill();ctx.stroke();
  ctx.fillStyle=INK;ctx.fillText(t,x,y-57);
  // Beine
  ctx.strokeStyle=INK;ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-30,y-6);ctx.lineTo(x-38,y+28);ctx.moveTo(x+30,y-6);ctx.lineTo(x+38,y+28);ctx.stroke();
  // Rahmen
  ctx.fillStyle='#4dd0ff';ctx.strokeStyle=INK;ctx.lineWidth=4;roundRect(x-40,y-46,80,52,10);ctx.fill();ctx.stroke();
  // Löcher (7x3 angedeutet)
  for(let r=0;r<3;r++)for(let c=0;c<7;c++){const hx=x-33+c*11,hy=y-38+r*15;
    ctx.fillStyle='#1c1442';ctx.beginPath();ctx.arc(hx,hy,4,0,7);ctx.fill();}
  // ein paar Spielsteine zur Deko
  ctx.fillStyle='#ff5ea8';ctx.beginPath();ctx.arc(x-11,y-8,4,0,7);ctx.fill();
  ctx.fillStyle='#ffe15e';ctx.beginPath();ctx.arc(x,y-8,4,0,7);ctx.fill();
  ctx.fillStyle='#ff5ea8';ctx.beginPath();ctx.arc(x-11,y-23,4,0,7);ctx.fill();
}

/* ---------------- FREUNDE & DM ---------------- */
let dmWith=null;
function elc(c){const d=document.createElement('div');d.className=c;return d;}
function mkbtn(c,t,fn){const b=document.createElement('button');b.className=c;b.textContent=t;b.onclick=fn;return b;}
function openFriends(){$('fmsg').textContent='';$('friends').style.display='flex';socket&&socket.emit('friends-list');}
function updateFreqBadge(n){const b=$('freqbadge');if(n>0){b.textContent=n;b.style.display='flex';}else b.style.display='none';}
function renderFriends(d){
  const rq=$('freqs');rq.innerHTML='';
  if(d.incoming&&d.incoming.length){d.incoming.forEach(f=>{const row=elc('frow');
    const nm=elc('fname');nm.textContent=f.username;row.appendChild(nm);
    row.appendChild(mkbtn('fbtn ok','Ja',()=>socket.emit('friend-accept',{fromId:f.id})));
    row.appendChild(mkbtn('fbtn no','Nein',()=>socket.emit('friend-decline',{fromId:f.id})));
    rq.appendChild(row);});$('freqwrap').style.display='block';}
  else $('freqwrap').style.display='none';
  const fl=$('flist');fl.innerHTML='';
  if(!d.friends||!d.friends.length)fl.innerHTML='<div class="fempty">Noch keine Freunde – füg jemanden hinzu!</div>';
  else d.friends.forEach(f=>{const row=elc('frow');
    const dot=document.createElement('span');dot.className='fon';dot.style.background=f.online?'#3ef08a':'#c9bce8';
    const nm=elc('fname');nm.textContent=f.username;
    row.appendChild(dot);row.appendChild(nm);
    row.appendChild(mkbtn('fbtn chat','Chat',()=>openDM(f)));
    fl.appendChild(row);});
  updateFreqBadge(d.incoming?d.incoming.length:0);
}
function openDM(f){dmWith=f;$('friends').style.display='none';$('dmhead').textContent='💬 '+f.username;$('dmlog').innerHTML='';$('dm').style.display='flex';socket&&socket.emit('dm-history',{withId:f.id});setTimeout(()=>$('dminput').focus(),50);}
function renderDMHistory(msgs){const log=$('dmlog');log.innerHTML='';(msgs||[]).forEach(m=>appendDM(m.mine?'me':'them',m.text));}
function appendDM(side,text){const d=elc('dmmsg '+side);d.textContent=text;$('dmlog').appendChild(d);$('dmlog').scrollTop=$('dmlog').scrollHeight;}
function sendDM(){const t=$('dminput').value.trim();if(!t||!dmWith||!socket)return;socket.emit('dm',{toId:dmWith.id,text:t});appendDM('me',t);$('dminput').value='';}
$('friendsBtn').onclick=openFriends;
$('fclose').onclick=()=>$('friends').style.display='none';
$('friends').onclick=e=>{if(e.target.id==='friends')$('friends').style.display='none';};
$('faddbtn').onclick=()=>{const u=$('faddinput').value.trim();if(u&&socket){socket.emit('friend-add',{username:u});$('faddinput').value='';}};
$('faddinput').addEventListener('keydown',e=>{if(e.key==='Enter')$('faddbtn').click();});
$('dmclose').onclick=()=>{$('dm').style.display='none';dmWith=null;};
$('dm').onclick=e=>{if(e.target.id==='dm'){$('dm').style.display='none';dmWith=null;}};
$('dmsend').onclick=sendDM;
$('dminput').addEventListener('keydown',e=>{if(e.key==='Enter')sendDM();});
$('pfriend').onclick=()=>{if(!profileName||!socket)return;socket.emit('friend-add',{username:profileName});addMsg('','','Freundschaftsanfrage an '+profileName+' gesendet.','sys');$('profile').style.display='none';};

function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;update(dt,now);render();requestAnimationFrame(loop);}

/* ---------------- ALIEN-AUSWAHL ---------------- */
const shapeEls=[],spc=document.getElementById('spc');
SPECIES.forEach((s,i)=>{const w=document.createElement('div');w.className='spc'+(i===0?' on':'');
  const sh=document.createElement('div');sh.className='shape sh-'+s;shapeEls.push(sh);
  const lab=document.createElement('span');lab.textContent=SP_LABEL[s];w.appendChild(sh);w.appendChild(lab);
  w.onclick=()=>{document.querySelectorAll('.spc').forEach(n=>n.classList.remove('on'));w.classList.add('on');pref.species=s;};spc.appendChild(w);});
const sw=document.getElementById('sw');
function tintShapes(){shapeEls.forEach(sh=>sh.style.background=pref.color);}
COLORS.forEach((c,i)=>{const d=document.createElement('div');d.className='sw'+(i===0?' on':'');d.style.background=c;
  d.onclick=()=>{document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));d.classList.add('on');pref.color=c;tintShapes();};sw.appendChild(d);});
tintShapes();
document.getElementById('enter').onclick=()=>{if(socket)socket.emit('setup',{species:pref.species,color:pref.color});};

/* ---------------- START ---------------- */
resize();seedOrbs();requestAnimationFrame(loop);
initAuth();
</script>
